<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Optional Chaining in JS</h1>
    <p>to overcome the problem of type error</p>
    <p>?:</p>
    <script>
        let a = 500;
        let b = 400;
        let res = (a > b) ? true : false; //?:
        console.log(res);

        const obj1 = {
            name: "pavan",
            age: 23,
            address: {
                city: "bengaluru",
                state : "karnataka",
                country : "india"
            },
            marks: [20, 30, 40, 50, 60],
            isWorking: () => {
                console.log("yes he is working");
            }
            }
//?: optional chaining operator used to avoid showing typeerror
            console.log(obj1);
            console.log("name: ", obj1.name);
            console.log("country: ", obj1.address.country);
            console.log("country: ", obj1?.address1?.country);
            console.log("marks: ",obj1.marks1?.[4]);

    </script>
</body>
</html>
