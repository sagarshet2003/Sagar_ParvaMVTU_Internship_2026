<!DOCTYPE html>
<html>
<head>
<title>To do List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.done{
text-decoration: line-through;
color: rgb(233, 165, 165);
}
</style>

</head>

<body>

<div class="container mt-5">

<h3>To do List</h3>

<input type="text" id="task" class="form-control" placeholder="Enter task">
<br>

<button onclick="addTask()" class="btn btn-success">Add Task</button>

<ul id="list" class="list-group mt-3"></ul>

</div>

<script>

function addTask(){

let task = document.getElementById("task").value;

if(task == ""){
alert("Enter task");
return;
}

let li = document.createElement("li");
li.className = "list-group-item";

li.innerHTML =
"<input type='checkbox' onclick='doneTask(this)'> " +
task +
" <button onclick='deleteTask(this)' class='btn btn-danger btn-sm'>Delete</button>";

document.getElementById("list").appendChild(li);

document.getElementById("task").value="";
}

function deleteTask(btn){
btn.parentElement.remove();
}

function doneTask(cb){
cb.parentElement.classList.toggle("done");
}

</script>

</body>
</html>
