<!DOCTYPE html>
<html>
<head>
<title>Student Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-color:#7bb3e4;
}

h2{
color:#8e44ad;
}

.form-box{
background:#ffffff;
padding:20px;
border-radius:8px;
border:2px solid #0d8de2;
}

input,select,textarea{
border:2px solid #39bea4 !important;
}

#result{
margin-top:20px;
color:#2c3e50;
background:#eafaf1;
padding:15px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2>Student Registration Form</h2>

<div class="form-box">

<form id="form">

<label>Name</label>
<input type="text" id="name" class="form-control mb-2">

<label>Email</label>
<input type="text" id="email" class="form-control mb-2">

<label>Phone</label>
<input type="text" id="phone" class="form-control mb-2">

<label>Course</label>
<select id="course" class="form-control mb-2">
<option>JavaScript</option>
<option>Python</option>
<option>Java</option>
</select>

<label>Gender</label><br>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<br><br>

<label>Skills</label><br>
<input type="checkbox" class="skill" value="HTML"> HTML
<input type="checkbox" class="skill" value="CSS"> CSS
<input type="checkbox" class="skill" value="JavaScript"> JavaScript
<br><br>

<label>Address</label>
<textarea id="address" class="form-control mb-3"></textarea>

<button type="submit" class="btn btn-success">Submit</button>
<button type="reset" class="btn btn-danger">Reset</button>

</form>

</div>

<div id="result"></div>

</div>

<script>

document.getElementById("form").addEventListener("submit", function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let course=document.getElementById("course").value;
let address=document.getElementById("address").value;

let gender=document.querySelector('input[name="gender"]:checked')?.value;

let skills=[];
document.querySelectorAll(".skill:checked").forEach(function(s){
skills.push(s.value);
});

if(name==""){
alert("Enter name");
return;
}

if(email.indexOf("@")==-1){
alert("Enter valid email");
return;
}

if(phone.length!=10){
alert("Phone must be 10 digits");
return;
}

document.getElementById("result").innerHTML=
"<h4>Student Details</h4>"+
"<p>Name: "+name+"</p>"+
"<p>Email: "+email+"</p>"+
"<p>Phone: "+phone+"</p>"+
"<p>Course: "+course+"</p>"+
"<p>Gender: "+gender+"</p>"+
"<p>Skills: "+skills+"</p>"+
"<p>Address: "+address+"</p>";

});

</script>

</body>
</html>
